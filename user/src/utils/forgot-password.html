<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #333333;
        }

        p {
            color: #555555;
        }

        .verification-code {
            font-size: 18px;
            font-weight: bold;
            color: #4caf50;
            margin-top: 10px;
        }

        .verification-link {
            display: block;
            margin-top: 20px;
            padding: 10px;
            background-color: #4caf50;
            color: #ffffff;
            text-decoration: none;
            border-radius: 3px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Forgot Password</h2>
        <p>Hello [User Name],</p>
        <p>To reset your password, please use the following verification code:</p>

        <p class="verification-code">[Verification Code]</p>
        <a class="verification-link" href="[Verification Link]">Verify Link</a>


        <p>If you did not request a password reset, you can ignore this email.</p>
        <p>Sincerely, <br />Your NordicScreen Team <br /><a href="https://nordicscreen.com/">Nordicscreen.com</a></p>

    </div>
</body>

</html>
